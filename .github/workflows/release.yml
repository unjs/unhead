name: Release

permissions:
  contents: write
  id-token: write

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    # Skip pre-release tags from main branch
    if: ${{ !contains(github.ref_name, '-') || github.event.base_ref != 'refs/heads/main' }}
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Force Set pnpm Registry
        run: pnpm config set registry https://registry.npmjs.org

      - name: Changelog
        if: ${{ !contains(github.ref_name, '-') }}
        run: npx changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: pnpm i
      - run: pnpm build:all

      - name: Detect prerelease tag
        id: prerelease
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ "$TAG" != *-* ]]; then
            echo "tag=" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == *beta* ]]; then
            echo "tag=--tag beta" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == *alpha* ]]; then
            echo "tag=--tag alpha" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == *rc* ]]; then
            echo "tag=--tag rc" >> "$GITHUB_OUTPUT"
          else
            echo "tag=--tag next" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        run: pnpm publish -r --access public --no-git-checks --provenance ${{ steps.prerelease.outputs.tag }}
