catalogMode: prefer
shellEmulator: true

trustPolicy: no-downgrade
trustPolicyExclude:
  - tinyexec@1.2.2
packages:
  - packages/*
  - packages-aliased/*
  - integrations/*
  - '!examples/vue-2'
  - examples/*
  - docs
overrides:
  '@arethetypeswrong/core>fflate': 0.8.2
  chokidar: 5.0.0
  # dedupe rolldown so unplugin resolves a single UnpluginInstance type across the
  # workspace; otherwise @unhead/bundler (rolldown@1.0.3) and the framework packages
  # (rolldown@1.1.2) produce incompatible plugin types and vue-tsc fails on bundler.ts
  rolldown: 1.1.2
catalog:
  '@angular-devkit/build-angular': ^21.2.19
  '@angular/cli': ^22.0.6
  '@angular/common': ^22.0.6
  '@angular/compiler': ^22.0.6
  '@angular/compiler-cli': ^22.0.6
  '@angular/core': ^22.0.6
  '@angular/platform-browser': ^22.0.6
  '@angular/platform-browser-dynamic': ^22.0.1
  '@angular/platform-server': ^22.0.6
  '@antfu/eslint-config': ^9.1.0
  '@arethetypeswrong/cli': ^0.18.5
  '@fast-check/vitest': ^0.4.1
