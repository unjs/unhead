catalogMode: prefer
minimumReleaseAgeExclude:
  - '@nuxt/kit@4.5.0'
  - '@nuxt/nitro-server@4.5.0'
  - '@nuxt/schema@4.5.0'
  - '@nuxt/vite-builder@4.5.0'
  - nuxt@4.5.0
shellEmulator: true

trustPolicy: no-downgrade
trustPolicyExclude:
  - tinyexec@1.2.2
packages:
  - packages/*
  - packages-aliased/*
  - integrations/*
  - test/fixtures/nuxt-cloudflare-module
  - '!examples/vue-2'
  - examples/*
  - docs
overrides:
  '@arethetypeswrong/core>fflate': 0.8.2
  chokidar: 5.0.0
  # dedupe rolldown so unplugin resolves a single UnpluginInstance type across the
  # workspace; otherwise @unhead/bundler (rolldown@1.0.3) and the framework packages
  # (rolldown@1.1.2) produce incompatible plugin types and vue-tsc fails on bundler.ts
  rolldown: 1.1.2
  unhead@3.1.8: workspace:*
catalog:
  '@angular-devkit/build-angular': ^21.2.19
  '@angular/cli': ^22.0.7
  '@angular/common': ^22.0.7
